<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       console.log("\nHourglass Pattern");
for(let i=5;i>=1;i--){
    let row="";
    for(let s=1;s<=5-i;s++){
        row+=" ";
    }
    for(let j=1;j<=i;j++){
        row+="* ";
    }
    console.log(row);
}
for(let i=2;i<=5;i++){
    let row="";
    for(let s=1;s<=5-i;s++){
        row+=" ";
    }
    for(let j=1;j<=i;j++){
        row+="* ";
    }
    console.log(row);
} 
    </script>
</body>
</html>
