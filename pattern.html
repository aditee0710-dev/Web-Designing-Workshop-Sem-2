// 12. Rotated Number Pyramid
console.log("\nRotated Number Pyramid");
for(let i=1;i<=4;i++){
    let row="";
    for(let j=1;j<=i;j++){
        row+=(i+j-1)+" ";
    }
    console.log(row);
}


// 13. Palindrome Triangle
console.log("\nPalindrome Triangle");
for(let i=1;i<=4;i++){
    let row="";
    for(let j=i;j>=1;j--){
        row+=j+" ";
    }
    for(let j=2;j<=i;j++){
        row+=j+" ";
    }
    console.log(row);
}


// 14. Alphabet Pyramid
console.log("\nAlphabet Pyramid");
for(let i=0;i<4;i++){
    let row="";
    for(let j=0;j<=i;j++){
        row+=String.fromCharCode(65+i)+" ";
    }
    console.log(row);
}


// 15. Continuous Alphabet Pyramid
console.log("\nContinuous Alphabet Pyramid");
let ch=65;
for(let i=1;i<=4;i++){
    let row="";
    for(let j=1;j<=i;j++){
        row+=String.fromCharCode(ch++)+" ";
    }
    console.log(row);
}
