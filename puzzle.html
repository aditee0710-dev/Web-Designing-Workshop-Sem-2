<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzles</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:rgb(64, 9, 9);
    text-align:center;
}

h2{
    background:linear-gradient(#100123,#1e0338);
    color:white;
    padding:15px;
    margin:0;
}

.board{
    display:grid;
    grid-template-columns:repeat(4,60px);
    gap:10px;
    justify-content:center;
    margin-top:20px;
}

.box{
    height:60px;
    width:60px;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    color:white;
}

.green{
    background:green;
}

.blue{
    background:#0096c7;
}
</style>
</head>

<body>

<h2>PUZZLES</h2>

<div class="board">
    <div class="box green">1</div>
    <div class="box green">2</div>
    <div class="box green">3</div>
    <div class="box green">4</div>

    <div class="box blue">🔒</div>
    <div class="box blue">🔒</div>
    <div class="box blue">🔒</div>
    <div class="box blue">🔒</div>

    <div class="box blue">🔒</div>
    <div class="box blue">🔒</div>
    <div class="box blue">🔒</div>
    <div class="box blue">🔒</div>

    <div class="box blue">🔒</div>
    <div class="box blue">🔒</div>
    <div class="box blue">🔒</div>
    <div class="box blue">🔒</div>

    <div class="box blue">🔒</div>
    <div class="box blue">🔒</div>
    <div class="box blue">🔒</div>
    <div class="box blue">🔒</div>
</div>

</body>
</html>
