<!DOCTYPE html><html>
<head>
<title>Flipped Simple Pyramid</title>
</head>
<body><script>

console.log("Flipped Simple Pyramid");

for(let i=1;i<=5;i++){

    let row="";

    // spaces
    for(let s=1;s<=5-i;s++){
        row += "  ";
    }

    // stars
    for(let j=1;j<=i;j++){
        row += "* ";
    }

    console.log(row);
}

</script></body>
</html>
