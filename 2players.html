<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2-players</title>
    <style>
    body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #2c3e50, #4ca1af);
    text-align: center;
    color: white;
}

header {
    padding: 20px;
}

.chess-container {
    display: flex;
    justify-content: center;
    margin: 20px;
}

.board {
    display: grid;
    grid-template-columns: repeat(8, 70px);
    grid-template-rows: repeat(8, 70px);
    border: 5px solid #333;
}

.square {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    cursor: pointer;
    transition: transform 0.2s ease;
}

.square:hover {
    transform: scale(1.1);
}

.white {
    background-color:white;
}

.black {
    background-color: black;
}

footer {
    margin-top: 20px;
    padding: 10px;
}
</style>
</head>
<body>
   
    <header>
        <h1>♟ Welcome to Chess World</h1>
        <p>Play the classic strategy game</p>
    </header>

    <section class="chess-container">

        <div class="board">
            
            <div class="square white">♜</div>
            <div class="square black">♞</div>
            <div class="square white">♝</div>
            <div class="square black">♛</div>
            <div class="square white">♚</div>
            <div class="square black">♝</div>

            <div class="square black">♟</div>

            <div class="square black">♟</div>
            <div class="square white">♟</div>

           
            <div class="square white"></div>
            <div class="square black"></div>

            <div class="square black"></div>
            <div class="square white"></div>
            <div class="square black"></div>
            <div class="square white"></div>
            <div class="square black"></div>
